name: Snyk Security Scan

on:
  workflow_dispatch:                    # Manual trigger from GitHub UI
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  security-events: write

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Node.js – continue even if no lock file found
      - name: Setup Node.js
        uses: actions/setup-node@v4
        continue-on-error: true        # 🔁 Continue even if this fails
        with:
          node-version: '20'
          cache: 'npm'

      # Install dependencies – continue even if npm install fails
      - name: Install dependencies
        run: npm install
        continue-on-error: true        # 🔁 Continue even if this fails

      # Run Snyk scan – this will still run even if previous steps failed
      - name: Run Snyk vulnerability scan
        uses: snyk/actions/node@master
        continue-on-error: true        # 🔁 Optional: keep pipeline green even if vulnerabilities found
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: --severity-threshold=high --all-projects
